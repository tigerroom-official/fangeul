name: fangeul
description: "Korean utility app for K-pop fans — Hangul keypad, keyboard converter, romanizer, fan phrases."
publish_to: 'none'
version: 1.0.1+16

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # i18n
  intl: any

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable 모델
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 오디오 재생
  just_audio: ^0.9.40

  # 로컬 저장소
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # 암호화
  crypto: ^3.0.3

  # 라우팅
  go_router: ^14.6.2

  # 애니메이션
  lottie: ^3.3.1

  # 공유
  share_plus: ^10.1.4

  # 광고
  google_mobile_ads: ^7.0.0

  # IAP
  in_app_purchase: ^3.2.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_remote_config: ^5.4.1
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.1

  # 리뷰 & URL
  in_app_review: ^2.0.10
  url_launcher: ^6.3.1

  # 테마 (Flutter SDK 전이 의존성 — 명시 선언)
  material_color_utilities: any

  # 유틸리티
  path_provider: ^2.1.4
  http: ^1.2.2
  confetti: ^0.8.0
  clock: ^1.1.1
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 코드 생성
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # 린트
  flutter_lints: ^5.0.0

  # 테스트
  mocktail: ^1.0.4

  # Driver 테스트
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/phrases/
    - assets/audio/
    - assets/lottie/
    - assets/calendar/
    - assets/groups/

  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansKR-Medium.ttf
          weight: 500
